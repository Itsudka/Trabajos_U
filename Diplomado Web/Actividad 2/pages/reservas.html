<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafe Hogareño</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <!-- ----------------------Navbar -------------------------- -->
     <section class="navbar">
        <nav class="navbar navbar-dark bg-dark fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><em>Café Hogareño</em></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Elige tu opcion</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/cata_coffe.html">Catalogo de cafe</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/reservas.html">Reservas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/contactanos.html">Contactanos</a>
                    </li>
                    </ul>
                </div>
                </div>
            </div>
        </nav>
    </section>
     <!-- ---------------------- Carrousel -------------------------- -->

    <section class="container my-5 pt-5">
    <h2 class="text-center mb-4 fw-bold">Mapa de reservas</h2>
    <p class="text-center text-secondary mb-4">
        Elige la mesa donde quieres disfrutar tu café en Café Hogareño.
    </p>

    <!-- Leyenda -->
    <div class="d-flex justify-content-center gap-3 mb-4">
        <div class="d-flex align-items-center gap-2">
        <span class="legend-box legend-available"></span> 
        <span>Disponible</span>
        </div>
        <div class="d-flex align-items-center gap-2">
        <span class="legend-box legend-reserved"></span> 
        <span>Reservada</span>
        </div>
        <div class="d-flex align-items-center gap-2">
        <span class="legend-box legend-selected"></span> 
        <span>Seleccionada</span>
        </div>
    </div>

    <!-- Mapa de mesas -->
    <div class="map-wrapper mx-auto">
        <div class="tables-grid">

        <!-- Mesa 1 -->
        <button 
        class="table-slot available"
        data-table="Mesa 1"
        data-zone="Cerca a la ventana"
        data-capacity="2 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa para 2 personas · Cerca a la ventana">
        M1
        </button>

        <!-- Mesa 2 -->
        <button 
        class="table-slot available"
        data-table="Mesa 2"
        data-zone="Cerca a la ventana"
        data-capacity="4 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa para 4 personas · Cerca a la ventana">
        M2
        </button>

        <!-- Mesa 3 -->
        <button 
        class="table-slot reserved"
        data-table="Mesa 3"
        data-zone="Zona central"
        data-capacity="2 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa reservada · Zona central · 2 personas">
        M3
        </button>

        <!-- Mesa 4 -->
        <button 
        class="table-slot available"
        data-table="Mesa 4"
        data-zone="Zona central"
        data-capacity="4 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa para 4 personas · Zona central">
        M4
        </button>

        <!-- Mesa 5 -->
        <button 
        class="table-slot available"
        data-table="Mesa 5"
        data-zone="Cerca a la barra"
        data-capacity="2 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa para 2 personas · Cerca a la barra">
        M5
        </button>

        <!-- Mesa 6 -->
        <button 
        class="table-slot reserved"
        data-table="Mesa 6"
        data-zone="Cerca a la barra"
        data-capacity="4 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa reservada · Cerca a la barra · 4 personas">
        M6
        </button>

        <!-- Mesa 7 -->
        <button 
        class="table-slot available"
        data-table="Mesa 7"
        data-zone="Zona tranquila"
        data-capacity="2 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa para 2 personas · Zona tranquila">
        M7
        </button>

        <!-- Mesa 8 -->
        <button 
        class="table-slot available"
        data-table="Mesa 8"
        data-zone="Zona tranquila"
        data-capacity="4 personas"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Mesa para 4 personas · Zona tranquila">
        M8
        </button>

        </div>
    </div>

    <!-- Info de selección -->
    <div class="text-center mt-4">
        <p id="mesa-seleccionada" class="fw-semibold">
        No has seleccionado ninguna mesa todavía.
        </p>
    </div>

    <div class="text-center mt-3">
        <button 
            id="btn-abrir-reserva"
            type="button" 
            class="btn btn-primary btn-cafe"
            data-bs-toggle="modal" 
            data-bs-target="#modalReserva">
            Reservar mesa seleccionada
        </button>
    </div>

    <!-- Modal de reserva -->

    <div class="modal fade" id="modalReserva" tabindex="-1" aria-labelledby="modalReservaLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
        
        <div class="modal-header">
            <h5 class="modal-title" id="modalReservaLabel">Confirmar reserva</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
            <!-- Resumen de la mesa -->
            <div class="mb-3">
            <label class="form-label">Mesa seleccionada</label>
            <input type="text" class="form-control" id="mesa-resumen" readonly>
            </div>

            <!-- Formulario -->
            <form id="form-reserva">
            <div class="mb-3">
                <label for="nombreReserva" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombreReserva" placeholder="Tu nombre">
            </div>

            <div class="mb-3">
                <label for="correoReserva" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="correoReserva" placeholder="tunombre@correo.com">
            </div>

            <div class="mb-3">
                <label for="fechaReserva" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fechaReserva">
            </div>

            <div class="mb-3">
                <label for="horaReserva" class="form-label">Hora</label>
                <input type="time" class="form-control" id="horaReserva">
            </div>

            <div class="mb-3">
                <label for="comentariosReserva" class="form-label">Comentarios (opcional)</label>
                <textarea class="form-control" id="comentariosReserva" rows="3" placeholder="Ej: Reunión de trabajo, necesito enchufe cerca, etc."></textarea>
            </div>
            </form>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary btn-cafe" id="btn-confirmar-reserva">
            Confirmar reserva
            </button>
        </div>

        </div>
    </div>


    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/reservas.js"></script>
  </body>
</html>
